# NGINX Reverse Proxy Configuration for OpenWebUI + LiteLLM
# SSL configuration based on Mozilla SSL Generator (Intermediate)
#
# Replace chat.example.edu and litellm.example.edu with your actual domains.

# Docker DNS resolver - re-resolves hostnames every 10s so nginx picks up
# new container IPs after restarts (prevents stale 502s)
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

# Performance logging — includes upstream response time and request duration.
# Use with: docker logs chat-nginx | grep 'rt=' to spot slow requests.
# Fields: $request_time = total nginx handling time (s),
#         $upstream_response_time = time waiting for backend (s),
#         $upstream_connect_time = TCP connect to backend (s)
log_format timed '$remote_addr - $remote_user [$time_local] '
                 '"$request" $status $body_bytes_sent '
                 '"$http_referer" "$http_user_agent" '
                 'rt=$request_time urt=$upstream_response_time '
                 'uct=$upstream_connect_time';

access_log /var/log/nginx/access.log timed;

# HTTP -> HTTPS redirect (both domains)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name chat.example.edu litellm.example.edu;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for OpenWebUI (chat.example.edu) - default server
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name chat.example.edu;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/chat.crt;
    ssl_certificate_key /etc/nginx/ssl/chat.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # Intermediate SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/javascript application/json application/xml text/xml application/xml+rss text/javascript;

    # Max upload size (for file attachments)
    client_max_body_size 50M;

    # Increase body buffer to avoid disk temp files for chat history
    client_body_buffer_size 256k;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;

    # Dashboard service (must be BEFORE catch-all /)
    location /dashboard {
        set $upstream_dashboard http://dashboard:8000;

        # Strip /dashboard prefix when proxying
        # /dashboard/health -> /health
        # /dashboard/static/js/app.js -> /static/js/app.js
        rewrite ^/dashboard(.*)$ $1 break;

        proxy_pass $upstream_dashboard;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dashboard;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # OpenWebUI (all traffic)
    location / {
        set $upstream_openwebui http://openwebui:8080;
        proxy_pass $upstream_openwebui;
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

# HTTPS server for LiteLLM Admin UI (litellm.example.edu)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name litellm.example.edu;

    # SSL Configuration (same cert with SAN)
    ssl_certificate /etc/nginx/ssl/chat.crt;
    ssl_certificate_key /etc/nginx/ssl/chat.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # Intermediate SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/javascript application/json application/xml text/xml application/xml+rss text/javascript;

    # Max upload size
    client_max_body_size 50M;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;

    # Redirect root to admin UI
    location = / {
        return 302 /ui/;
    }

    # Block external access to Prometheus metrics
    location = /metrics {
        return 403;
    }

    # LiteLLM (all traffic)
    location / {
        set $upstream_litellm http://litellm:4000;
        proxy_pass $upstream_litellm;
        proxy_redirect http:// https://;
    }
}
