# =============================================================================
# AI Gateway Helm Chart - values.yaml
# Kubernetes deployment for Open WebUI + LiteLLM
# =============================================================================

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------
global:
  # Image pull secrets for private registries
  imagePullSecrets: []

  # Storage class for PVCs (override per cloud provider)
  storageClass: ""

  # Domain configuration
  domains:
    chat: "chat.example.edu"
    admin: "litellm.example.edu"

# -----------------------------------------------------------------------------
# Vault Integration (Secrets Store CSI Driver)
# -----------------------------------------------------------------------------
vault:
  enabled: true

  # Vault server address
  address: "https://vault.example.edu"

  # Kubernetes auth configuration
  auth:
    role: "ai-gateway"
    path: "kubernetes"

  # Secret paths in Vault (KV v2)
  secrets:
    database:
      path: "secret/data/ai-gateway/database"
    litellm:
      path: "secret/data/ai-gateway/litellm"
    apiKeys:
      path: "secret/data/ai-gateway/api-keys"
    oauth:
      path: "secret/data/ai-gateway/oauth"
    webui:
      path: "secret/data/ai-gateway/webui"

# -----------------------------------------------------------------------------
# External PostgreSQL Configuration
# -----------------------------------------------------------------------------
postgresql:
  # External PostgreSQL connection details
  host: "postgres.example.edu"
  port: 5432

  # Database names
  databases:
    openwebui: "openwebui"
    litellm: "litellm"

  # Credentials from Vault (path: secret/data/ai-gateway/database)
  # Keys: username, password

# -----------------------------------------------------------------------------
# PgBouncer (Connection Pooling)
# -----------------------------------------------------------------------------
pgbouncer:
  enabled: true

  image:
    repository: bitnami/pgbouncer
    tag: "1.22.0"
    pullPolicy: IfNotPresent

  replicaCount: 3

  # Pool configuration for high concurrency
  config:
    poolMode: "transaction"
    maxClientConn: 10000
    defaultPoolSize: 50
    minPoolSize: 10
    reservePoolSize: 25
    reservePoolTimeout: 5
    maxDbConnections: 200
    maxUserConnections: 200
    serverIdleTimeout: 600
    serverLifetime: 3600
    queryWaitTimeout: 120

  service:
    type: ClusterIP
    port: 6432

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  pdb:
    enabled: true
    minAvailable: 2

  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Redis (In-cluster with Sentinel)
# -----------------------------------------------------------------------------
redis:
  enabled: true

  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  # StatefulSet configuration
  replicaCount: 3

  # Sentinel configuration for HA
  sentinel:
    enabled: true
    quorum: 2
    port: 26379

  persistence:
    enabled: true
    storageClass: ""
    size: "10Gi"
    accessModes:
      - ReadWriteOnce

  service:
    type: ClusterIP
    port: 6379

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"

  config:
    maxmemory: "1gb"
    maxmemoryPolicy: "allkeys-lru"
    appendonly: "yes"

  pdb:
    enabled: true
    minAvailable: 2

  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# LiteLLM (AI Gateway)
# -----------------------------------------------------------------------------
litellm:
  enabled: true

  image:
    repository: ghcr.io/berriai/litellm
    tag: "main-latest"
    pullPolicy: Always

  replicaCount: 5

  # Gunicorn workers per pod
  numWorkers: 4

  service:
    type: ClusterIP
    port: 4000

  # Application configuration
  config:
    proxyBaseUrl: "https://chat.example.edu"
    # Budget settings
    maxEndUserBudget: 10.0
    budgetDuration: "7d"
    timezone: "America/New_York"
    # Logging
    setVerbose: false
    dropParams: true
    storeModelInDb: true
    # Router settings
    routingStrategy: "simple-shuffle"
    numRetries: 2
    timeout: 120

  resources:
    requests:
      memory: "2Gi"
      cpu: "2"
    limits:
      memory: "4Gi"
      cpu: "4"

  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 50
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  pdb:
    enabled: true
    minAvailable: 3

  livenessProbe:
    enabled: true
    httpGet:
      path: /health/liveliness
      port: 4000
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5

  readinessProbe:
    enabled: true
    httpGet:
      path: /health/readiness
      port: 4000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  serviceAccount:
    create: true
    name: "litellm"
    annotations: {}

  nodeSelector: {}
  tolerations: []

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: litellm
            topologyKey: kubernetes.io/hostname

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: litellm

# -----------------------------------------------------------------------------
# OpenWebUI (Chat Frontend)
# -----------------------------------------------------------------------------
openwebui:
  enabled: true

  image:
    repository: ghcr.io/open-webui/open-webui
    tag: "main"
    pullPolicy: Always

  replicaCount: 5

  service:
    type: ClusterIP
    port: 8080

  # Application configuration
  config:
    name: "AI Gateway"
    url: "https://chat.example.edu"
    defaultModels: "gpt-5-nano"
    # Feature flags
    enableOllamaApi: false
    enableOpenaiApi: true
    enableSignup: false
    enableLoginForm: false
    enableOauthSignup: true
    enableRagWebSearch: false
    enableForwardUserInfoHeaders: true
    # OAuth configuration
    enableOauthRoleManagement: true
    oauthRolesClaim: "roles"
    oauthAllowedRoles: "internal_user"
    oauthAdminRoles: "proxy_admin"
    defaultUserRole: "user"

  # Persistent storage for user data
  persistence:
    enabled: true
    storageClass: ""
    size: "50Gi"
    accessModes:
      - ReadWriteMany  # Required for multi-replica

  # Branding assets
  branding:
    enabled: true

  resources:
    requests:
      memory: "1Gi"
      cpu: "1"
    limits:
      memory: "2Gi"
      cpu: "2"

  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 30
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  pdb:
    enabled: true
    minAvailable: 3

  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  serviceAccount:
    create: true
    name: "openwebui"
    annotations: {}

  nodeSelector: {}
  tolerations: []

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: openwebui
            topologyKey: kubernetes.io/hostname

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: openwebui

# -----------------------------------------------------------------------------
# Ingress Configuration (HTTP only - TLS at load balancer)
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: "nginx"

  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    # WebSocket support for chat streaming
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

# -----------------------------------------------------------------------------
# Network Policies
# -----------------------------------------------------------------------------
networkPolicies:
  enabled: true

  # Default deny all ingress/egress
  defaultDeny: true

  # Allow DNS resolution
  allowDns: true

# -----------------------------------------------------------------------------
# Monitoring (Prometheus ServiceMonitor)
# -----------------------------------------------------------------------------
monitoring:
  serviceMonitor:
    enabled: false
    interval: "30s"
    scrapeTimeout: "10s"
    labels: {}

# -----------------------------------------------------------------------------
# Pod Security Context
# -----------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # Some apps need writable filesystem
  capabilities:
    drop:
      - ALL
