# Production values for AI Gateway
# Override values.yaml for production deployment

# External PostgreSQL connection (update with your managed DB details)
postgresql:
  host: "postgres.example.edu"  # UPDATE: Your managed PostgreSQL host
  port: 5432

# PgBouncer - production scale
pgbouncer:
  replicaCount: 5
  autoscaling:
    minReplicas: 5
    maxReplicas: 10

# Redis - production scale
redis:
  replicaCount: 3
  persistence:
    size: "20Gi"

# LiteLLM - production scale for 10k users
litellm:
  replicaCount: 10
  numWorkers: 8
  resources:
    requests:
      memory: "4Gi"
      cpu: "4"
    limits:
      memory: "8Gi"
      cpu: "8"
  autoscaling:
    minReplicas: 10
    maxReplicas: 50

# OpenWebUI - production scale
openwebui:
  replicaCount: 10
  resources:
    requests:
      memory: "2Gi"
      cpu: "2"
    limits:
      memory: "4Gi"
      cpu: "4"
  autoscaling:
    minReplicas: 10
    maxReplicas: 30
  persistence:
    size: "100Gi"

# Enable monitoring in production
monitoring:
  serviceMonitor:
    enabled: true
