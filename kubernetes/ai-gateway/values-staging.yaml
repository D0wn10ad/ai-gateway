# Staging values for AI Gateway
# Override values.yaml for staging/testing deployment

# External PostgreSQL connection (staging DB)
postgresql:
  host: "postgres-staging.example.edu"  # UPDATE: Your staging PostgreSQL host
  port: 5432

# PgBouncer - minimal for staging
pgbouncer:
  replicaCount: 2
  autoscaling:
    enabled: false

# Redis - minimal for staging
redis:
  replicaCount: 1
  sentinel:
    enabled: false
  persistence:
    size: "5Gi"

# LiteLLM - minimal for staging
litellm:
  replicaCount: 2
  numWorkers: 2
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"
  autoscaling:
    enabled: false

# OpenWebUI - minimal for staging
openwebui:
  replicaCount: 2
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  autoscaling:
    enabled: false
  persistence:
    size: "10Gi"

# Disable monitoring in staging
monitoring:
  serviceMonitor:
    enabled: false

# Relax PDBs in staging
pgbouncer:
  pdb:
    enabled: false

redis:
  pdb:
    enabled: false

litellm:
  pdb:
    enabled: false

openwebui:
  pdb:
    enabled: false
