{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-gateway.litellm.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.litellm.labels" . | nindent 4 }}
spec:
  {{- if not .Values.litellm.autoscaling.enabled }}
  replicas: {{ .Values.litellm.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ai-gateway.litellm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-litellm.yaml") . | sha256sum }}
      labels:
        {{- include "ai-gateway.litellm.labels" . | nindent 8 }}
    spec:
      {{- include "ai-gateway.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "ai-gateway.litellm.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: litellm
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
          imagePullPolicy: {{ .Values.litellm.image.pullPolicy }}
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "{{ .Values.litellm.service.port }}"
            - "--num_workers"
            - "{{ .Values.litellm.numWorkers }}"
          ports:
            - name: http
              containerPort: {{ .Values.litellm.service.port }}
              protocol: TCP
          env:
            - name: PROXY_BASE_URL
              value: {{ .Values.litellm.config.proxyBaseUrl | quote }}
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ include "ai-gateway.pgbouncer.serviceName" . }}:{{ .Values.pgbouncer.service.port }}/{{ .Values.postgresql.databases.litellm }}"
            - name: UI_USERNAME
              value: "admin"
          envFrom:
            - secretRef:
                name: {{ include "ai-gateway.fullname" . }}-litellm-secrets
          {{- if .Values.litellm.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.litellm.livenessProbe.httpGet.path }}
              port: {{ .Values.litellm.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.litellm.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.litellm.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.litellm.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.litellm.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.litellm.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.litellm.readinessProbe.httpGet.path }}
              port: {{ .Values.litellm.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.litellm.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.litellm.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.litellm.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.litellm.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
            {{- if .Values.vault.enabled }}
            - name: vault-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ai-gateway.fullname" . }}-litellm-config
        {{- if .Values.vault.enabled }}
        - name: vault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "ai-gateway.fullname" . }}-litellm-vault
        {{- end }}
      {{- with .Values.litellm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.litellm.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.litellm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.litellm.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
