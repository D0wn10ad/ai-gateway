{{- if .Values.vault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "ai-gateway.fullname" . }}-database-vault
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
spec:
  provider: vault
  parameters:
    vaultAddress: {{ .Values.vault.address | quote }}
    roleName: {{ .Values.vault.auth.role | quote }}
    objects: |
      - objectName: "POSTGRES_USER"
        secretPath: "{{ .Values.vault.secrets.database.path }}"
        secretKey: "username"
      - objectName: "POSTGRES_PASSWORD"
        secretPath: "{{ .Values.vault.secrets.database.path }}"
        secretKey: "password"
  secretObjects:
    - secretName: {{ include "ai-gateway.fullname" . }}-database-credentials
      type: Opaque
      data:
        - objectName: "POSTGRES_USER"
          key: POSTGRES_USER
        - objectName: "POSTGRES_PASSWORD"
          key: POSTGRES_PASSWORD
{{- end }}
