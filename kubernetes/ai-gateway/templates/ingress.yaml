{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ai-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    # chat.example.edu -> OpenWebUI
    - host: {{ .Values.global.domains.chat }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ai-gateway.openwebui.serviceName" . }}
                port:
                  number: {{ .Values.openwebui.service.port }}
    # litellm.example.edu -> LiteLLM Admin UI
    - host: {{ .Values.global.domains.admin }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ai-gateway.litellm.serviceName" . }}
                port:
                  number: {{ .Values.litellm.service.port }}
{{- end }}
