{{- if and .Values.vault.enabled .Values.litellm.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "ai-gateway.fullname" . }}-litellm-vault
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.litellm.labels" . | nindent 4 }}
spec:
  provider: vault
  parameters:
    vaultAddress: {{ .Values.vault.address | quote }}
    roleName: {{ .Values.vault.auth.role | quote }}
    objects: |
      - objectName: "LITELLM_MASTER_KEY"
        secretPath: "{{ .Values.vault.secrets.litellm.path }}"
        secretKey: "master_key"
      - objectName: "UI_PASSWORD"
        secretPath: "{{ .Values.vault.secrets.litellm.path }}"
        secretKey: "ui_password"
      - objectName: "ANTHROPIC_API_KEY"
        secretPath: "{{ .Values.vault.secrets.apiKeys.path }}"
        secretKey: "anthropic"
      - objectName: "OPENAI_API_KEY"
        secretPath: "{{ .Values.vault.secrets.apiKeys.path }}"
        secretKey: "openai"
      - objectName: "GOOGLE_API_KEY"
        secretPath: "{{ .Values.vault.secrets.apiKeys.path }}"
        secretKey: "google"
      - objectName: "POSTGRES_USER"
        secretPath: "{{ .Values.vault.secrets.database.path }}"
        secretKey: "username"
      - objectName: "POSTGRES_PASSWORD"
        secretPath: "{{ .Values.vault.secrets.database.path }}"
        secretKey: "password"
  secretObjects:
    - secretName: {{ include "ai-gateway.fullname" . }}-litellm-secrets
      type: Opaque
      data:
        - objectName: "LITELLM_MASTER_KEY"
          key: LITELLM_MASTER_KEY
        - objectName: "UI_PASSWORD"
          key: UI_PASSWORD
        - objectName: "ANTHROPIC_API_KEY"
          key: ANTHROPIC_API_KEY
        - objectName: "OPENAI_API_KEY"
          key: OPENAI_API_KEY
        - objectName: "GOOGLE_API_KEY"
          key: GOOGLE_API_KEY
        - objectName: "POSTGRES_USER"
          key: POSTGRES_USER
        - objectName: "POSTGRES_PASSWORD"
          key: POSTGRES_PASSWORD
{{- end }}
