{{- if .Values.openwebui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-gateway.openwebui.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.openwebui.labels" . | nindent 4 }}
spec:
  {{- if not .Values.openwebui.autoscaling.enabled }}
  replicas: {{ .Values.openwebui.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ai-gateway.openwebui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-gateway.openwebui.labels" . | nindent 8 }}
    spec:
      {{- include "ai-gateway.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "ai-gateway.openwebui.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: openwebui
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: "{{ .Values.openwebui.image.repository }}:{{ .Values.openwebui.image.tag }}"
          imagePullPolicy: {{ .Values.openwebui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.openwebui.service.port }}
              protocol: TCP
          env:
            # Database
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ include "ai-gateway.pgbouncer.serviceName" . }}:{{ .Values.pgbouncer.service.port }}/{{ .Values.postgresql.databases.openwebui }}"

            # OpenAI API (pointing to LiteLLM)
            - name: OPENAI_API_BASE_URL
              value: "http://{{ include "ai-gateway.litellm.serviceName" . }}:{{ .Values.litellm.service.port }}/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-openwebui-secrets
                  key: LITELLM_MASTER_KEY
            - name: ENABLE_OPENAI_API
              value: {{ .Values.openwebui.config.enableOpenaiApi | quote }}

            # Disable Ollama
            - name: ENABLE_OLLAMA_API
              value: {{ .Values.openwebui.config.enableOllamaApi | quote }}

            # Microsoft Entra ID OIDC
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-openwebui-secrets
                  key: MICROSOFT_CLIENT_ID
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-openwebui-secrets
                  key: MICROSOFT_CLIENT_SECRET
            - name: MICROSOFT_CLIENT_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-openwebui-secrets
                  key: MICROSOFT_TENANT_ID
            - name: ENABLE_OAUTH_SIGNUP
              value: {{ .Values.openwebui.config.enableOauthSignup | quote }}
            - name: ENABLE_LOGIN_FORM
              value: {{ .Values.openwebui.config.enableLoginForm | quote }}

            # OAuth Role-Based Access Control
            - name: ENABLE_OAUTH_ROLE_MANAGEMENT
              value: {{ .Values.openwebui.config.enableOauthRoleManagement | quote }}
            - name: OAUTH_ROLES_CLAIM
              value: {{ .Values.openwebui.config.oauthRolesClaim | quote }}
            - name: OAUTH_ALLOWED_ROLES
              value: {{ .Values.openwebui.config.oauthAllowedRoles | quote }}
            - name: OAUTH_ADMIN_ROLES
              value: {{ .Values.openwebui.config.oauthAdminRoles | quote }}
            - name: DEFAULT_USER_ROLE
              value: {{ .Values.openwebui.config.defaultUserRole | quote }}

            # User info forwarding to LiteLLM
            - name: ENABLE_FORWARD_USER_INFO_HEADERS
              value: {{ .Values.openwebui.config.enableForwardUserInfoHeaders | quote }}

            # WebUI Settings
            - name: WEBUI_URL
              value: {{ .Values.openwebui.config.url | quote }}
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-openwebui-secrets
                  key: WEBUI_SECRET_KEY
            - name: WEBUI_NAME
              value: {{ .Values.openwebui.config.name | quote }}
            - name: DEFAULT_MODELS
              value: {{ .Values.openwebui.config.defaultModels | quote }}

            # Disable features not needed
            - name: ENABLE_SIGNUP
              value: {{ .Values.openwebui.config.enableSignup | quote }}
            - name: ENABLE_RAG_WEB_SEARCH
              value: {{ .Values.openwebui.config.enableRagWebSearch | quote }}
          envFrom:
            - secretRef:
                name: {{ include "ai-gateway.fullname" . }}-openwebui-secrets
          {{- if .Values.openwebui.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.openwebui.livenessProbe.httpGet.path }}
              port: {{ .Values.openwebui.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.openwebui.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.openwebui.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.openwebui.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.openwebui.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.openwebui.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.openwebui.readinessProbe.httpGet.path }}
              port: {{ .Values.openwebui.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.openwebui.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.openwebui.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.openwebui.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.openwebui.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.openwebui.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.openwebui.persistence.enabled }}
            - name: data
              mountPath: /app/backend/data
            {{- end }}
            {{- if .Values.vault.enabled }}
            - name: vault-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.openwebui.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ai-gateway.openwebui.serviceName" . }}-data
        {{- end }}
        {{- if .Values.vault.enabled }}
        - name: vault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "ai-gateway.fullname" . }}-openwebui-vault
        {{- end }}
      {{- with .Values.openwebui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.openwebui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.openwebui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.openwebui.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
