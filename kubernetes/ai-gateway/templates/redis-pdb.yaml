{{- if and .Values.redis.enabled .Values.redis.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ai-gateway.redis.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.redis.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.redis.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "ai-gateway.redis.selectorLabels" . | nindent 6 }}
{{- end }}
---
{{- if and .Values.redis.enabled .Values.redis.sentinel.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-gateway.fullname" . }}-redis-sentinel
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.redis.labels" . | nindent 4 }}
data:
  sentinel.conf: |
    port {{ .Values.redis.sentinel.port }}
    sentinel monitor mymaster {{ include "ai-gateway.redis.serviceName" . }}-0.{{ include "ai-gateway.redis.serviceName" . }}-headless {{ .Values.redis.service.port }} {{ .Values.redis.sentinel.quorum }}
    sentinel down-after-milliseconds mymaster 5000
    sentinel parallel-syncs mymaster 1
    sentinel failover-timeout mymaster 60000
{{- end }}
