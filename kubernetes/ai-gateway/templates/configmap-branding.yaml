{{- if and .Values.openwebui.enabled .Values.openwebui.branding.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-gateway.fullname" . }}-branding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.openwebui.labels" . | nindent 4 }}
binaryData:
  # Branding files should be base64 encoded
  # To add branding files, use:
  #   kubectl create configmap branding --from-file=branding/ -n <namespace>
  # Or add base64 encoded files here
  {}
---
# Note: For production, consider using a ConfigMap with binary data
# or mounting branding assets from a PVC or external storage.
#
# Example to create ConfigMap from files:
#   kubectl create configmap {{ include "ai-gateway.fullname" . }}-branding \
#     --from-file=favicon.ico=branding/favicon.ico \
#     --from-file=favicon.svg=branding/favicon.svg \
#     --from-file=logo.png=branding/logo.png \
#     --from-file=chat.svg=branding/chat.svg \
#     -n {{ .Release.Namespace }}
{{- end }}
