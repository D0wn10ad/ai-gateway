{{- if and .Values.networkPolicies.enabled .Values.redis.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ai-gateway.redis.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.redis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ai-gateway.redis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from LiteLLM
    - from:
        - podSelector:
            matchLabels:
              {{- include "ai-gateway.litellm.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.redis.service.port }}
    # Allow from OpenWebUI
    - from:
        - podSelector:
            matchLabels:
              {{- include "ai-gateway.openwebui.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.redis.service.port }}
    # Allow Redis replication between pods
    - from:
        - podSelector:
            matchLabels:
              {{- include "ai-gateway.redis.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.redis.service.port }}
        {{- if .Values.redis.sentinel.enabled }}
        - port: {{ .Values.redis.sentinel.port }}
        {{- end }}
  egress:
    # Allow Redis replication between pods
    - to:
        - podSelector:
            matchLabels:
              {{- include "ai-gateway.redis.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.redis.service.port }}
        {{- if .Values.redis.sentinel.enabled }}
        - port: {{ .Values.redis.sentinel.port }}
        {{- end }}
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
{{- end }}
