{{- if .Values.openwebui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-gateway.openwebui.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.openwebui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.openwebui.service.type }}
  ports:
    - port: {{ .Values.openwebui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ai-gateway.openwebui.selectorLabels" . | nindent 4 }}
{{- end }}
