{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-gateway.fullname" . }}-litellm-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.litellm.labels" . | nindent 4 }}
data:
  config.yaml: |
    # LiteLLM Proxy Configuration
    # Generated by Helm chart

    model_list:
      # ==================== ANTHROPIC ====================
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
        model_info:
          description: "Anthropic's most capable model"

      - model_name: claude-haiku-4-5
        litellm_params:
          model: anthropic/claude-3-5-haiku-20241022
          api_key: os.environ/ANTHROPIC_API_KEY
        model_info:
          description: "Fast and efficient Anthropic model"

      # ==================== OPENAI ====================
      - model_name: gpt-5.2
        litellm_params:
          model: openai/gpt-5.2
          api_key: os.environ/OPENAI_API_KEY
        model_info:
          description: "OpenAI's most capable model"

      - model_name: gpt-5-mini
        litellm_params:
          model: openai/gpt-5-mini
          api_key: os.environ/OPENAI_API_KEY
        model_info:
          description: "Efficient OpenAI model"

      - model_name: gpt-5-nano
        litellm_params:
          model: openai/gpt-5-nano
          api_key: os.environ/OPENAI_API_KEY
        model_info:
          description: "Lightweight OpenAI model - lowest cost"

      # ==================== GOOGLE VERTEX AI (Express Mode) ====================
      - model_name: gemini-3-pro-preview
        litellm_params:
          model: gemini/gemini-3-pro-preview
          api_base: https://aiplatform.googleapis.com/v1/publishers/google
          api_key: os.environ/GOOGLE_API_KEY
        model_info:
          description: "Google's advanced reasoning model (Preview)"

      - model_name: gemini-3-flash-preview
        litellm_params:
          model: gemini/gemini-3-flash-preview
          api_base: https://aiplatform.googleapis.com/v1/publishers/google
          api_key: os.environ/GOOGLE_API_KEY
        model_info:
          description: "Google's fast multimodal model (Preview)"

      # ==================== IMAGE GENERATION ====================
      - model_name: gpt-image-1.5
        litellm_params:
          model: openai/gpt-image-1.5
          api_key: os.environ/OPENAI_API_KEY
        model_info:
          mode: image_generation
          description: "OpenAI GPT Image 1.5 - Advanced image generation"
          input_cost_per_image: 0.04

      - model_name: gemini-3-pro-image-preview
        litellm_params:
          model: gemini/gemini-3-pro-image-preview
          api_base: https://aiplatform.googleapis.com/v1/publishers/google
          api_key: os.environ/GOOGLE_API_KEY
        model_info:
          mode: image_generation
          description: "Google Gemini 3 Pro Image Preview via Vertex AI Express"
          input_cost_per_image: 0.02

    litellm_settings:
      set_verbose: {{ .Values.litellm.config.setVerbose }}
      drop_params: {{ .Values.litellm.config.dropParams }}
      max_end_user_budget: {{ .Values.litellm.config.maxEndUserBudget }}
      budget_duration: {{ .Values.litellm.config.budgetDuration }}
      timezone: {{ .Values.litellm.config.timezone }}
      default_end_user_params:
        budget_id: weekly-10-usd
      extra_spend_tag_headers:
        - "x-openwebui-user-id"
        - "x-openwebui-user-email"
        - "x-openwebui-user-name"

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      store_model_in_db: {{ .Values.litellm.config.storeModelInDb }}
      user_header_name: x-openwebui-user-email

    router_settings:
      routing_strategy: {{ .Values.litellm.config.routingStrategy }}
      num_retries: {{ .Values.litellm.config.numRetries }}
      timeout: {{ .Values.litellm.config.timeout }}
{{- end }}
