{{- if .Values.pgbouncer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-gateway.fullname" . }}-pgbouncer-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.pgbouncer.labels" . | nindent 4 }}
data:
  pgbouncer.ini: |
    [databases]
    {{ .Values.postgresql.databases.openwebui }} = host={{ .Values.postgresql.host }} port={{ .Values.postgresql.port }} dbname={{ .Values.postgresql.databases.openwebui }}
    {{ .Values.postgresql.databases.litellm }} = host={{ .Values.postgresql.host }} port={{ .Values.postgresql.port }} dbname={{ .Values.postgresql.databases.litellm }}

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = {{ .Values.pgbouncer.service.port }}
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = {{ .Values.pgbouncer.config.poolMode }}
    max_client_conn = {{ .Values.pgbouncer.config.maxClientConn }}
    default_pool_size = {{ .Values.pgbouncer.config.defaultPoolSize }}
    min_pool_size = {{ .Values.pgbouncer.config.minPoolSize }}
    reserve_pool_size = {{ .Values.pgbouncer.config.reservePoolSize }}
    reserve_pool_timeout = {{ .Values.pgbouncer.config.reservePoolTimeout }}
    max_db_connections = {{ .Values.pgbouncer.config.maxDbConnections }}
    max_user_connections = {{ .Values.pgbouncer.config.maxUserConnections }}
    server_idle_timeout = {{ .Values.pgbouncer.config.serverIdleTimeout }}
    server_lifetime = {{ .Values.pgbouncer.config.serverLifetime }}
    query_wait_timeout = {{ .Values.pgbouncer.config.queryWaitTimeout }}
    admin_users = postgres
    stats_users = postgres
    ignore_startup_parameters = extra_float_digits
    log_connections = 0
    log_disconnections = 0
    log_pooler_errors = 1
{{- end }}
