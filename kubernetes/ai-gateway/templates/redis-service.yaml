{{- if .Values.redis.enabled }}
# Headless service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-gateway.redis.serviceName" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
    {{- if .Values.redis.sentinel.enabled }}
    - port: {{ .Values.redis.sentinel.port }}
      targetPort: sentinel
      protocol: TCP
      name: sentinel
    {{- end }}
  selector:
    {{- include "ai-gateway.redis.selectorLabels" . | nindent 4 }}
---
# ClusterIP service for application access
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-gateway.redis.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.redis.labels" . | nindent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
    {{- if .Values.redis.sentinel.enabled }}
    - port: {{ .Values.redis.sentinel.port }}
      targetPort: sentinel
      protocol: TCP
      name: sentinel
    {{- end }}
  selector:
    {{- include "ai-gateway.redis.selectorLabels" . | nindent 4 }}
{{- end }}
