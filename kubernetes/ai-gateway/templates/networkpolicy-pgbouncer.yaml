{{- if and .Values.networkPolicies.enabled .Values.pgbouncer.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ai-gateway.pgbouncer.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.pgbouncer.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ai-gateway.pgbouncer.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from LiteLLM
    - from:
        - podSelector:
            matchLabels:
              {{- include "ai-gateway.litellm.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.pgbouncer.service.port }}
    # Allow from OpenWebUI
    - from:
        - podSelector:
            matchLabels:
              {{- include "ai-gateway.openwebui.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.pgbouncer.service.port }}
  egress:
    # Allow to external PostgreSQL
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: {{ .Values.postgresql.port }}
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
{{- end }}
