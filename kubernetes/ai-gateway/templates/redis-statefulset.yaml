{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ai-gateway.redis.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.redis.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ai-gateway.redis.serviceName" . }}-headless
  replicas: {{ .Values.redis.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-gateway.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-gateway.redis.labels" . | nindent 8 }}
    spec:
      {{- include "ai-gateway.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: redis
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.service.port }}
              protocol: TCP
            {{- if .Values.redis.sentinel.enabled }}
            - name: sentinel
              containerPort: {{ .Values.redis.sentinel.port }}
              protocol: TCP
            {{- end }}
          command:
            - redis-server
          args:
            - --maxmemory
            - {{ .Values.redis.config.maxmemory | quote }}
            - --maxmemory-policy
            - {{ .Values.redis.config.maxmemoryPolicy }}
            - --appendonly
            - {{ .Values.redis.config.appendonly }}
            {{- if gt (int .Values.redis.replicaCount) 1 }}
            - --replica-announce-ip
            - $(POD_IP)
            {{- end }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.redis.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
        {{- if .Values.redis.sentinel.enabled }}
        - name: sentinel
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - name: sentinel
              containerPort: {{ .Values.redis.sentinel.port }}
              protocol: TCP
          command:
            - redis-sentinel
          args:
            - /etc/redis/sentinel.conf
          volumeMounts:
            - name: sentinel-config
              mountPath: /etc/redis
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
        {{- end }}
      volumes:
        {{- if .Values.redis.sentinel.enabled }}
        - name: sentinel-config
          configMap:
            name: {{ include "ai-gateway.fullname" . }}-redis-sentinel
        {{- end }}
      {{- with .Values.redis.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.redis.persistence.accessModes | nindent 10 }}
        {{- if .Values.redis.persistence.storageClass }}
        storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
        {{- else if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
  {{- end }}
{{- end }}
