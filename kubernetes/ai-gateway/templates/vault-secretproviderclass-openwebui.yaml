{{- if and .Values.vault.enabled .Values.openwebui.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "ai-gateway.fullname" . }}-openwebui-vault
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.openwebui.labels" . | nindent 4 }}
spec:
  provider: vault
  parameters:
    vaultAddress: {{ .Values.vault.address | quote }}
    roleName: {{ .Values.vault.auth.role | quote }}
    objects: |
      - objectName: "WEBUI_SECRET_KEY"
        secretPath: "{{ .Values.vault.secrets.webui.path }}"
        secretKey: "secret_key"
      - objectName: "LITELLM_MASTER_KEY"
        secretPath: "{{ .Values.vault.secrets.litellm.path }}"
        secretKey: "master_key"
      - objectName: "MICROSOFT_CLIENT_ID"
        secretPath: "{{ .Values.vault.secrets.oauth.path }}"
        secretKey: "client_id"
      - objectName: "MICROSOFT_CLIENT_SECRET"
        secretPath: "{{ .Values.vault.secrets.oauth.path }}"
        secretKey: "client_secret"
      - objectName: "MICROSOFT_TENANT_ID"
        secretPath: "{{ .Values.vault.secrets.oauth.path }}"
        secretKey: "tenant_id"
      - objectName: "POSTGRES_USER"
        secretPath: "{{ .Values.vault.secrets.database.path }}"
        secretKey: "username"
      - objectName: "POSTGRES_PASSWORD"
        secretPath: "{{ .Values.vault.secrets.database.path }}"
        secretKey: "password"
  secretObjects:
    - secretName: {{ include "ai-gateway.fullname" . }}-openwebui-secrets
      type: Opaque
      data:
        - objectName: "WEBUI_SECRET_KEY"
          key: WEBUI_SECRET_KEY
        - objectName: "LITELLM_MASTER_KEY"
          key: LITELLM_MASTER_KEY
        - objectName: "MICROSOFT_CLIENT_ID"
          key: MICROSOFT_CLIENT_ID
        - objectName: "MICROSOFT_CLIENT_SECRET"
          key: MICROSOFT_CLIENT_SECRET
        - objectName: "MICROSOFT_TENANT_ID"
          key: MICROSOFT_TENANT_ID
        - objectName: "POSTGRES_USER"
          key: POSTGRES_USER
        - objectName: "POSTGRES_PASSWORD"
          key: POSTGRES_PASSWORD
{{- end }}
