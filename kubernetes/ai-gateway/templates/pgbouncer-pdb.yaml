{{- if and .Values.pgbouncer.enabled .Values.pgbouncer.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ai-gateway.pgbouncer.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.pgbouncer.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pgbouncer.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "ai-gateway.pgbouncer.selectorLabels" . | nindent 6 }}
{{- end }}
