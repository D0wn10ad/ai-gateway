{{- if and .Values.openwebui.enabled .Values.openwebui.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ai-gateway.openwebui.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.openwebui.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.openwebui.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "ai-gateway.openwebui.selectorLabels" . | nindent 6 }}
{{- end }}
