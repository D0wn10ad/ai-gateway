{{- if and .Values.openwebui.enabled .Values.openwebui.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ai-gateway.openwebui.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.openwebui.labels" . | nindent 4 }}
  {{- with .Values.openwebui.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
