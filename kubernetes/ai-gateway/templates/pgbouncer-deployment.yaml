{{- if .Values.pgbouncer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-gateway.pgbouncer.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-gateway.pgbouncer.labels" . | nindent 4 }}
spec:
  {{- if not .Values.pgbouncer.autoscaling.enabled }}
  replicas: {{ .Values.pgbouncer.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ai-gateway.pgbouncer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-pgbouncer.yaml") . | sha256sum }}
      labels:
        {{- include "ai-gateway.pgbouncer.labels" . | nindent 8 }}
    spec:
      {{- include "ai-gateway.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: pgbouncer
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: "{{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}"
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          ports:
            - name: pgbouncer
              containerPort: {{ .Values.pgbouncer.service.port }}
              protocol: TCP
          env:
            - name: PGBOUNCER_DATABASE
              value: "*"
            - name: POSTGRESQL_HOST
              value: {{ .Values.postgresql.host | quote }}
            - name: POSTGRESQL_PORT
              value: {{ .Values.postgresql.port | quote }}
          envFrom:
            - secretRef:
                name: {{ include "ai-gateway.fullname" . }}-database-credentials
          {{- if .Values.pgbouncer.livenessProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: {{ .Values.pgbouncer.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.pgbouncer.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.pgbouncer.livenessProbe.timeoutSeconds }}
          {{- end }}
          {{- if .Values.pgbouncer.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: {{ .Values.pgbouncer.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.pgbouncer.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.pgbouncer.readinessProbe.timeoutSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /bitnami/pgbouncer/conf/pgbouncer.ini
              subPath: pgbouncer.ini
            {{- if .Values.vault.enabled }}
            - name: vault-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ai-gateway.fullname" . }}-pgbouncer-config
        {{- if .Values.vault.enabled }}
        - name: vault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "ai-gateway.fullname" . }}-database-vault
        {{- end }}
      {{- with .Values.pgbouncer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pgbouncer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pgbouncer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
