# LiteLLM Proxy Configuration
# https://docs.litellm.ai/docs/proxy/configs

model_list:
  # ==================== ANTHROPIC ====================
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      description: "Anthropic's most capable model"

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-3-5-haiku-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      description: "Fast and efficient Anthropic model"

  # ==================== OPENAI ====================
  - model_name: gpt-5.2
    litellm_params:
      model: openai/gpt-5.2
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "OpenAI's most capable model"

  - model_name: gpt-5-mini
    litellm_params:
      model: openai/gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "Efficient OpenAI model"

  - model_name: gpt-5-nano
    litellm_params:
      model: openai/gpt-5-nano
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "Lightweight OpenAI model - lowest cost"

  # ==================== GOOGLE VERTEX AI (Express Mode) ====================
  # Using Vertex AI Express endpoint with API key authentication
  # LiteLLM appends /models/{model}:generateContent to api_base
  - model_name: gemini-3-pro-preview
    litellm_params:
      model: gemini/gemini-3-pro-preview
      api_base: https://aiplatform.googleapis.com/v1/publishers/google
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      description: "Google's advanced reasoning model (Preview)"

  - model_name: gemini-3-flash-preview
    litellm_params:
      model: gemini/gemini-3-flash-preview
      api_base: https://aiplatform.googleapis.com/v1/publishers/google
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      description: "Google's fast multimodal model (Preview)"

  # ==================== IMAGE GENERATION ====================
  - model_name: gpt-image-1.5
    litellm_params:
      model: openai/gpt-image-1.5
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: image_generation
      description: "OpenAI GPT Image 1.5 - Advanced image generation"
      input_cost_per_image: 0.04

  - model_name: gemini-3-pro-image-preview
    litellm_params:
      model: gemini/gemini-3-pro-image-preview
      api_base: https://aiplatform.googleapis.com/v1/publishers/google
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      mode: image_generation
      description: "Google Gemini 3 Pro Image Preview via Vertex AI Express"
      input_cost_per_image: 0.02

litellm_settings:
  # Enable detailed logging for debugging
  set_verbose: false

  # Drop unsupported parameters instead of erroring
  drop_params: true

  # Default max budget per end-user (in USD) - $10 weekly
  max_end_user_budget: 10.0
  budget_duration: 7d
  timezone: America/New_York

  # Assign default budget to all new end users
  default_end_user_params:
    budget_id: weekly-10-usd

  # Capture OpenWebUI headers as spend tags for tracking (lowercase!)
  extra_spend_tag_headers:
    - "x-openwebui-user-id"
    - "x-openwebui-user-email"
    - "x-openwebui-user-name"

general_settings:
  # Master key for admin operations
  master_key: os.environ/LITELLM_MASTER_KEY

  # Database for spend tracking
  database_url: os.environ/DATABASE_URL

  # Store model info in DB for better tracking
  store_model_in_db: true

  # Map OpenWebUI user header to LiteLLM user tracking (lowercase!)
  user_header_name: x-openwebui-user-email

# Router settings for load balancing
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
